<html lang="id" data-theme="light">
<head>

<style>
/* ── NAVBAR override untuk quiz (navy, bukan surface) ── */
.navbar{background:var(--navy);border-bottom:1px solid rgba(255,255,255,.08);}
.nav-logo-tag{color:rgba(255,255,255,.4);}
.nav-logo-name{color:#fff;}
.nav-btn{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);}
.nav-btn:hover{background:rgba(255,255,255,.13);color:#fff;border-color:rgba(255,255,255,.25);}

/* ── NAVBAR QUIZ (pakai materi.css navbar + override tipis) ── */
.navbar{position:sticky;top:0;z-index:50;}
/* q-top tidak lagi dipakai — navbar standar menggantikan */
.q-top{display:none;}
.q-breadcrumb{
  padding:.5rem var(--px);
  border-bottom:1px solid var(--border);
  background:var(--surface-2);
  font-size:.72rem;color:var(--text-3);
  display:flex;align-items:center;gap:.4rem;
  flex-shrink:0;flex-wrap:wrap;
}
.q-breadcrumb a{color:var(--text-3);text-decoration:none;transition:color .15s;}
.q-breadcrumb a:hover{color:var(--teal);}
.q-breadcrumb span{opacity:.4;}
.q-bc-sep{opacity:.35;margin:0 .05rem;}
.q-bc-kode{font-family:var(--mono);font-weight:700;color:var(--teal);letter-spacing:.04em;}
.q-bc-mode{font-weight:600;color:var(--text-2);}
.q-bc-level{font-weight:700;font-family:var(--mono);}

/* ── TOMBOL NAV BAWAH — style EksaktaLab card-btn ── */
.q-nav{
  flex-shrink:0;border-top:1px solid var(--border);
  padding:.85rem var(--px);
  display:flex;align-items:center;justify-content:space-between;gap:.75rem;
  background:var(--surface);
}
.q-nav-btn{
  display:flex;align-items:center;justify-content:space-between;
  gap:.65rem;height:40px;padding:0 1rem 0 1.1rem;
  border-radius:var(--radius-sm);
  border:1.5px solid var(--border);
  background:var(--surface-2);color:var(--text-2);
  font-size:.82rem;font-weight:600;font-family:var(--sans);
  cursor:pointer;transition:all .2s;letter-spacing:.01em;
}
.q-nav-btn:hover:not(:disabled){border-color:var(--teal);color:var(--teal);}
.q-nav-btn:disabled{opacity:.35;cursor:not-allowed;}
.q-nav-btn.next{
  background:transparent;color:var(--teal);
  border-color:rgba(0,191,165,.35);
  padding:0 .75rem 0 1.1rem;
}
.q-nav-btn.next:hover{background:var(--teal);color:#fff;border-color:var(--teal);}
.q-nav-btn.next:hover .q-nav-arrow{background:rgba(255,255,255,.2);}
.q-nav-btn.next:disabled{opacity:.35;cursor:not-allowed;}
.q-nav-arrow{
  width:26px;height:26px;border-radius:6px;
  background:rgba(0,191,165,.12);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .2s;
}
.q-nav-arrow svg{width:11px;height:11px;}
.q-nav-ctr{font-family:var(--mono);font-size:.75rem;color:var(--text-3);}
.q-nav-ctr em{color:var(--text);font-style:normal;font-weight:700;}

/* ── LAYOUT ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--sans);background:var(--surface);color:var(--text);
  height:100dvh;display:flex;flex-direction:column;overflow:hidden;
}

/* TOPBAR */
.q-top-brand-name em{font-style:normal;color:var(--teal);}
/* PROGRESS */
.q-progress-bar{height:3px;background:var(--surface-3);flex-shrink:0;}
.q-progress-fill{height:100%;background:var(--teal);transition:width .4s ease;width:0%;}

/* BREADCRUMB */
/* MAIN */
.q-layout{flex:1;display:flex;min-height:0;overflow:hidden;position:relative;}

/* SIDEBAR */
.q-sidebar{
  width:214px;flex-shrink:0;
  background:var(--surface-2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.q-sb-head{
  padding:.85rem 1rem .7rem;border-bottom:1px solid var(--border);
  flex:1 1 auto;min-height:0;display:flex;flex-direction:column;
}
.q-sb-label{
  font-family:var(--mono);font-size:.58rem;font-weight:700;
  color:var(--teal);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.5rem;flex-shrink:0;
}
.q-num-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;align-content:start;overflow-y:auto;min-height:0;flex:1;padding:2px;}
.q-num-grid::-webkit-scrollbar{width:5px;}
.q-num-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.q-num-btn{
  aspect-ratio:1;border-radius:5px;border:1.5px solid var(--border);
  background:var(--surface);color:var(--text-3);
  font-family:var(--mono);font-size:.7rem;font-weight:600;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;
}
.q-num-btn:hover{border-color:var(--teal);color:var(--teal);}
.q-num-btn.cur{border-color:var(--teal);background:var(--teal);color:var(--navy);}
.q-num-btn.ok{border-color:var(--green-b);background:var(--green);color:var(--green-b);}
.q-num-btn.ng{border-color:var(--red-b);background:var(--red);color:var(--red-b);}
.q-num-btn.cur.ok,.q-num-btn.cur.ng{box-shadow:inset 0 0 0 2px var(--teal);}

.q-sb-tip{
  flex-shrink:0;
  padding:.7rem 1rem;margin:.6rem .75rem .75rem;
  border-radius:var(--radius-sm);
  background:rgba(0,191,165,.06);border:1px solid rgba(0,191,165,.18);
  font-size:.7rem;color:var(--text-3);line-height:1.55;
}
.q-sb-tip-lbl{
  display:flex;align-items:center;gap:.3rem;
  font-family:var(--mono);font-size:.58rem;font-weight:700;
  color:var(--teal);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3rem;
}
.q-sb-tip-lbl svg{width:10px;height:10px;}
.q-prog-num{font-size:.82rem;color:var(--text-2);margin-bottom:.5rem;}
.q-prog-num em{font-style:normal;font-weight:700;color:var(--text);font-family:var(--mono);font-size:1.05rem;}
.q-prog-bar{height:6px;background:var(--surface-3);border-radius:4px;overflow:hidden;margin-bottom:.6rem;}
.q-prog-fill{height:100%;background:var(--teal);border-radius:4px;width:0%;transition:width .35s ease;}
.q-prog-stats{display:flex;flex-wrap:wrap;gap:.45rem .7rem;}
.qps{display:flex;align-items:center;gap:.3rem;font-size:.7rem;color:var(--text-3);}
.qps em{font-style:normal;font-weight:700;}
.qps-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.qps-ok .qps-dot{background:var(--green-b);}
.qps-ok em{color:var(--green-b);}
.qps-ng .qps-dot{background:var(--red-b);}
.qps-ng em{color:var(--red-b);}
.qps-sisa .qps-dot{background:var(--surface-3);border:1px solid var(--text-3);}
.q-num-btn{position:relative;}
.q-num-btn.mk::after{content:'';position:absolute;top:2px;right:2px;width:5px;height:5px;border-radius:50%;background:#F59E0B;}

.q-sb-legend{
  padding:.75rem 1rem;border-top:1px solid var(--border);
  margin-top:auto;flex-shrink:0;
}
.q-legend-row{
  display:flex;align-items:center;gap:.4rem;
  font-size:.68rem;color:var(--text-3);margin-bottom:.3rem;
}
.q-legend-row:last-child{margin-bottom:0;}
.q-legend-dot{
  width:10px;height:10px;border-radius:3px;border:1.5px solid;flex-shrink:0;
}
.ld-cur{background:var(--teal);border-color:var(--teal);}
.ld-ok {background:var(--green);border-color:var(--green-b);}
.ld-ng {background:var(--red);border-color:var(--red-b);}
.ld-bl {background:var(--surface);border-color:var(--border);}

/* CONTENT */
.q-content{flex:1;overflow-y:auto;padding:1.5rem 1.75rem;background:var(--surface);}

/* SOAL META ROW */
.q-soal-meta{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1rem;flex-wrap:wrap;gap:.5rem;
}
.q-soal-pos{font-family:var(--mono);font-size:.68rem;font-weight:700;color:var(--text-3);}
.q-tandai{
  display:flex;align-items:center;gap:.3rem;
  font-size:.7rem;font-weight:600;color:var(--text-3);
  background:none;border:1.5px solid var(--border);border-radius:6px;
  padding:.22rem .6rem;cursor:pointer;transition:all .18s;font-family:var(--sans);
}
.q-tandai:hover{border-color:var(--yellow-b);color:var(--yellow-b);}
.q-tandai.on{border-color:var(--yellow-b);color:var(--yellow-b);background:var(--yellow);}
.q-tandai svg{width:11px;height:11px;stroke:currentColor;}

/* TYPE BADGE */
.q-type{
  display:inline-flex;align-items:center;
  font-family:var(--mono);font-size:.57rem;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;
  padding:.15rem .5rem;border-radius:4px;
}
.qt-pg {background:var(--blue);color:var(--blue-b);}
.qt-bs {background:var(--green);color:var(--green-b);}
.qt-mma{background:var(--yellow);color:var(--yellow-b);}

/* SOAL TEXT */
.q-text{font-size:.94rem;font-weight:500;color:var(--text);line-height:1.75;margin-bottom:1.1rem;}

/* PG OPTIONS */
.q-opts{display:flex;flex-direction:column;gap:.5rem;}
.q-opt{
  display:flex;align-items:flex-start;gap:.8rem;
  padding:.7rem .95rem;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--surface);
  cursor:pointer;transition:all .18s;text-align:left;width:100%;
  font-size:.875rem;color:var(--text);line-height:1.55;
}
.q-opt:hover:not(:disabled){border-color:var(--teal);background:rgba(0,191,165,.04);}
.q-opt:disabled{cursor:default;}
.q-opt-key{
  font-family:var(--mono);font-size:.67rem;font-weight:700;
  color:var(--text-3);background:var(--surface-2);border:1px solid var(--border);
  width:22px;height:22px;border-radius:5px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  margin-top:.1rem;transition:all .18s;
}
.q-opt-text{flex:1;}
.q-opt.correct{border-color:var(--green-b)!important;background:var(--green)!important;}
.q-opt.correct .q-opt-key{background:var(--green-b)!important;color:#fff!important;border-color:var(--green-b)!important;}
.q-opt.wrong{border-color:var(--red-b)!important;background:var(--red)!important;}
.q-opt.wrong .q-opt-key{background:var(--red-b)!important;color:#fff!important;border-color:var(--red-b)!important;}

/* BS TABLE */
/* MMA */
.q-mma-note{
  font-family:var(--mono);font-size:.62rem;color:var(--text-3);
  margin-bottom:.8rem;display:flex;align-items:center;gap:.3rem;
}
.q-mma-note svg{width:11px;height:11px;stroke:currentColor;}
.q-mma-opts{display:flex;flex-direction:column;gap:.5rem;}
.q-mma-opt{
  display:flex;align-items:flex-start;gap:.8rem;
  padding:.7rem .95rem;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--surface);
  cursor:pointer;transition:all .18s;text-align:left;width:100%;
  font-size:.875rem;color:var(--text);line-height:1.55;
}
.q-mma-opt:hover:not(:disabled){border-color:var(--teal);background:rgba(0,191,165,.04);}
.q-mma-opt:disabled{cursor:default;}
.q-checkbox{
  width:18px;height:18px;border-radius:4px;border:2px solid var(--border);
  background:var(--surface);flex-shrink:0;margin-top:.15rem;
  display:flex;align-items:center;justify-content:center;transition:all .18s;
}
.q-mma-opt.sel .q-checkbox{background:var(--teal);border-color:var(--teal);}
.q-checkbox svg{width:10px;height:10px;stroke:#fff;stroke-width:2.8;display:none;}
.q-mma-opt.sel .q-checkbox svg{display:block;}
.q-mma-opt.correct{border-color:var(--green-b)!important;background:var(--green)!important;}
.q-mma-opt.correct .q-checkbox{background:var(--green-b)!important;border-color:var(--green-b)!important;}
.q-mma-opt.wrong{border-color:var(--red-b)!important;background:var(--red)!important;}
.q-mma-opt.wrong .q-checkbox{background:var(--red-b)!important;border-color:var(--red-b)!important;}
.q-mma-opt.missed{border-color:var(--green-b)!important;opacity:.55;}
.q-confirm-btn{margin-top:.85rem;height:38px;padding:0 1.25rem;border-radius:var(--radius-sm);background:var(--teal);color:#fff;font-size:.8rem;font-weight:700;font-family:var(--sans);border:none;cursor:pointer;transition:all .2s;}
.q-confirm-btn:hover{background:var(--teal-dim);}
.q-confirm-btn:disabled{opacity:.4;cursor:not-allowed;}

/* PEMBAHASAN */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* NAV BAWAH */
.q-nav-btn svg{width:12px;height:12px;stroke:currentColor;flex-shrink:0;}
.q-nav-ctr em{color:var(--text);font-style:normal;font-weight:700;}

/* SKOR */
.q-score{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2rem 1.5rem;text-align:center;overflow-y:auto;background:var(--surface);
}
.q-score-ring{
  width:108px;height:108px;border-radius:50%;
  background:var(--navy);border:4px solid var(--teal);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin-bottom:.85rem;
}
.q-score-num{font-family:var(--display);font-size:2.2rem;font-weight:700;color:#fff;line-height:1;letter-spacing:-.04em;}
.q-score-den{font-family:var(--mono);font-size:.6rem;color:var(--teal);margin-top:.12rem;}
.q-score-label{font-family:var(--display);font-size:1.15rem;font-weight:700;color:var(--text);letter-spacing:-.02em;margin-bottom:.3rem;}
.q-score-msg{font-size:.83rem;color:var(--text-3);max-width:320px;line-height:1.6;margin-bottom:.85rem;}
.q-score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem;max-width:300px;width:100%;margin-bottom:.85rem;}
.q-score-item{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.65rem .4rem;}
.q-score-item-n{font-family:var(--display);font-size:1.45rem;font-weight:700;color:var(--text);}
.q-score-item-n.g{color:var(--green-b);} .q-score-item-n.r{color:var(--red-b);}
.q-score-item-l{font-family:var(--mono);font-size:.53rem;font-weight:700;color:var(--text-3);letter-spacing:.06em;text-transform:uppercase;margin-top:.1rem;}
.q-score-acts{display:flex;gap:.55rem;flex-wrap:wrap;justify-content:center;}
.q-score-btn{
  height:36px;padding:0 1rem;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--surface-2);
  color:var(--text-2);font-size:.78rem;font-weight:600;font-family:var(--sans);
  cursor:pointer;display:flex;align-items:center;gap:.35rem;transition:all .18s;
}
.q-score-btn:hover{border-color:var(--teal);color:var(--teal);}
.q-score-btn.p{background:var(--teal);color:var(--navy);border-color:var(--teal);}
.q-score-btn.p:hover{background:var(--teal-dim);}
/* COMPLETION CARD (latihan) */
.q-done-ov{position:absolute;inset:0;z-index:60;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;text-align:center;overflow-y:auto;}
.q-done-ico{width:58px;height:58px;border-radius:50%;background:rgba(0,191,165,.12);border:2px solid var(--teal);color:var(--teal);display:flex;align-items:center;justify-content:center;margin-bottom:.85rem;flex-shrink:0;}
.q-done-ico svg{width:26px;height:26px;}
.q-done-title{font-family:var(--display);font-size:1.25rem;font-weight:700;color:var(--text);letter-spacing:-.02em;margin-bottom:.3rem;}
.q-done-msg{font-size:.83rem;color:var(--text-3);max-width:330px;line-height:1.6;margin-bottom:1rem;}
.q-done-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem;max-width:300px;width:100%;margin-bottom:1.1rem;}
.q-done-stat{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.6rem .4rem;}
.q-done-n{font-family:var(--display);font-size:1.4rem;font-weight:700;color:var(--text);display:block;line-height:1;}
.q-done-n.g{color:var(--green-b);}
.q-done-n.r{color:var(--red-b);}
.q-done-l{font-family:var(--mono);font-size:.53rem;font-weight:700;color:var(--text-3);letter-spacing:.06em;text-transform:uppercase;margin-top:.25rem;display:block;}
.q-done-acts{display:flex;gap:.55rem;flex-wrap:wrap;justify-content:center;}
.q-done-btn{height:36px;padding:0 1rem;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface-2);color:var(--text-2);font-size:.78rem;font-weight:600;font-family:var(--sans);cursor:pointer;display:flex;align-items:center;gap:.35rem;transition:all .18s;}
.q-done-btn svg{width:13px;height:13px;}
.q-done-btn:hover{border-color:var(--teal);color:var(--teal);}
.q-done-btn.p{background:var(--teal);color:var(--navy);border-color:var(--teal);}
.q-done-btn.p:hover{background:var(--teal-dim);}

/* MOBILE */
.q-sb-fab{
  display:none;position:fixed;bottom:1.25rem;left:1rem;z-index:60;
  width:42px;height:42px;border-radius:50%;
  background:var(--teal);color:var(--navy);border:none;
  box-shadow:0 4px 14px rgba(0,191,165,.35);
  align-items:center;justify-content:center;cursor:pointer;
}
.q-sb-fab svg{width:17px;height:17px;stroke:currentColor;}
.q-sb-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);z-index:55;
}
/* ── BENAR SALAH — card list style ── */
.q-bs-list{display:flex;flex-direction:column;gap:.45rem;}
.q-bs-item{display:flex;align-items:center;justify-content:space-between;gap:.75rem;padding:.7rem 1rem;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);transition:all .18s;}
.q-bs-item.item-ok{border-color:var(--green-b);background:var(--green);}
.q-bs-item.item-ng{border-color:var(--red-b);background:var(--red);}
.q-bs-item-text{flex:1;font-size:.875rem;color:var(--text);line-height:1.5;font-weight:500;}
.q-bs-item-label{font-family:var(--mono);font-size:.65rem;font-weight:700;color:var(--text-3);margin-right:.5rem;flex-shrink:0;}
.q-bs-btns{display:flex;gap:.5rem;flex-shrink:0;}
.q-bs-btn{
  width:56px;height:34px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--surface-2);
  color:var(--text-3);font-family:var(--mono);font-size:.67rem;font-weight:700;
  cursor:pointer;transition:all .18s;letter-spacing:.04em;
}
.q-bs-btn:hover:not(:disabled):not(.sel-b):not(.sel-s){border-color:var(--teal);color:var(--teal);background:rgba(0,191,165,.07);}
.q-bs-btn:disabled{cursor:default;}
.q-bs-btn.sel-b{border-color:var(--teal);background:rgba(0,191,165,.12);color:var(--teal);}
.q-bs-btn.sel-s{border-color:var(--teal);background:rgba(0,191,165,.12);color:var(--teal);}
.q-bs-btn.cor{border-color:var(--green-b)!important;background:var(--green-b)!important;color:#fff!important;}
.q-bs-btn.wrg{border-color:var(--red-b)!important;background:var(--red-b)!important;color:#fff!important;}
.q-bs-confirm{margin-top:.85rem;height:38px;padding:0 1.25rem;border-radius:var(--radius-sm);background:var(--teal);color:#fff;font-size:.8rem;font-weight:700;font-family:var(--sans);border:none;cursor:pointer;transition:all .2s;}
.q-bs-confirm:hover{background:var(--teal-dim);}
.q-bs-confirm:disabled{opacity:.4;cursor:not-allowed;}

/* ═══════════════════════════════════════════════════════
   RESPONSIVE — MOBILE
═══════════════════════════════════════════════════════ */

/* Matikan hover di touchscreen */

/* Strip nomor soal (hidden di desktop) */

  position: sticky;
  bottom: 0;
  z-index: 15;
}
.q-mob-strip::-webkit-scrollbar { display: none; }
.q-mob-strip-inner {
  display: flex;
  gap: .38rem;
  min-width: max-content;
  align-items: center;
  padding: .1rem 0;
}

/* Nomor soal di strip mobile — lebih kecil dari sidebar */
.q-mob-num {
  width: 32px; height: 32px;

  display: flex; align-items: center; justify-content: center;

/* Nav tombol di mobile (sama tapi lebih compact) */
.q-mob-nav {
  display: none;
  align-items: center;
  justify-content: space-between;
  padding: .6rem .85rem .75rem;
  gap: .6rem;
  background: var(--surface);
  border-top: 1px solid var(--border);

.q-mob-nav-btn {

.q-mob-nav-btn.next {

};

function init(){
  const data = window.quizDB && window.quizDB[PAKET_ID];
  if(!data){
    document.getElementById('q-content').innerHTML =
      '<div style="padding:2rem;text-align:center;color:var(--text-3)">Soal sedang disiapkan. Kembali lagi segera!</div>';
    return;
  }
  S.soal=data.soal;
  S.answers=Array(data.soal.length).fill(null);
  S.correct=Array(data.soal.length).fill(null);
  S.marked=loadMarks(data.soal.length);
  document.getElementById('q-tot').textContent=data.soal.length;
  buildGrid();buildMobStrip();renderQ(0);updateProg();
}
const MARK_KEY='eksakta-mark-'+PAKET_ID;
function loadMarks(n){
  try{const a=JSON.parse(localStorage.getItem(MARK_KEY));if(Array.isArray(a)&&a.length===n)return a.map(Boolean);}catch(e){}
  return Array(n).fill(false);
}
function saveMarks(){try{localStorage.setItem(MARK_KEY,JSON.stringify(S.marked));}catch(e){}}

function buildGrid(){
  const g=document.getElementById('q-grid');
  g.innerHTML=S.soal.map((_,i)=>
    `<button class="q-num-btn${i===0?' cur':''}${S.marked[i]?' mk':''}" id="nb${i}" onclick="goTo(${i})">${i+1}</button>`
  ).join('');
}

function updateBtn(i){updateMobNum(i);
  const b=document.getElementById('nb'+i);if(!b)return;
  b.className='q-num-btn';
  if(i===S.cur)b.classList.add('cur');
  if(S.correct[i]===true)b.classList.add('ok');
  if(S.correct[i]===false)b.classList.add('ng');
  if(S.marked[i])b.classList.add('mk');
}

function updateProg(){
  const tot=S.soal.length;
  const done=S.answers.filter(a=>a!==null).length;
  const benar=S.correct.filter(c=>c===true).length;
  const salah=S.correct.filter(c=>c===false).length;
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('qp-done',done);set('qp-tot',tot);set('qp-benar',benar);set('qp-salah',salah);set('qp-sisa',tot-done);
  const f=document.getElementById('qp-fill');if(f)f.style.width=(done/tot*100)+'%';
}

function goTo(i){if(S.done&&!S.review)return;S.cur=i;S.soal.forEach((_,j)=>{updateBtn(j);updateMobNum(j);});updateMobNav(i);renderQ(i);closeSb();}
function go(d){const n=S.cur+d;if(n<0||n>=S.soal.length)return;S.cur=n;S.soal.forEach((_,j)=>{updateBtn(j);updateMobNum(j);});updateMobNav(n);renderQ(n);}

function renderQ(i){
  const q=S.soal[i],ans=S.answers[i],answered=ans!==null;
  document.getElementById('q-cur').textContent=i+1;updateMobNav(i);
  document.getElementById('btn-prev').disabled=i===0;

  const isLast=i===S.soal.length-1;
  const nb=document.getElementById('btn-next');
  if(isLast){
    nb.innerHTML='Selesai<svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="2,7 5,10 12,3"/></svg>';
    nb.onclick=showScore;
  }else{
    nb.innerHTML='Selanjutnya<svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="5,2 10,6.5 5,11"/></svg>';
    nb.onclick=()=>go(1);
  }

  let html='';
  // meta row
  const typeLabel={pg:'Pilihan Ganda',bs:'Benar / Salah',mma:'Multiple Answer'};
  const typeCls={pg:'qt-pg',bs:'qt-bs',mma:'qt-mma'};
  html+=`<div class="q-soal-meta">
    <span class="q-type ${typeCls[q.type]||'qt-pg'}">${typeLabel[q.type]||'Pilihan Ganda'}</span>
    <button class="q-tandai${S.marked[i]?' on':''}" id="tm${i}" onclick="mark(${i})">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 2h6v9l-3-2.2L4 11V2z"/></svg>
      ${S.marked[i]?'Ditandai':'Tandai Soal'}
    </button>
  </div>`;

  // soal text
  html+=`<div class="q-text">${q.q}</div>`;

  // options
  if(q.type==='bs') html+=renderBS(q,i,answered);
  else if(q.type==='mma') html+=renderMMA(q,i,answered);
  else html+=renderPG(q,i,answered);

  // pembahasan
  if(answered){
    const ok=S.correct[i];
    const vc=ok?'ok':'ng';
    const vt=ok?'Jawaban Benar!':'Jawaban Salah';
    const icoSvg=ok
      ?'<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><polyline points="2,6 5,9 10,3"/></svg>'
      :'<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><line x1="3" y1="3" x2="9" y2="9"/><line x1="9" y1="3" x2="3" y2="9"/></svg>';
    html+=`<div class="q-pem show open pem-${vc}" id="pem${i}">
      <div class="q-pem-hd" onclick="togglePem(${i})">
        <span class="q-pem-ico">${icoSvg}</span>
        <span class="q-pem-badge">${vt}</span>
        <span class="q-pem-chevron"><svg viewBox="0 0 12 12" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,4 6,8 10,4"/></svg></span>
      </div>
      <div class="q-pem-body">
        <div class="q-pem-solve-hd"><span class="q-pem-solve-dot"></span><span class="q-pem-solve-title">Pembahasan</span></div>
        <div class="q-pem-body-inner">${q.p}</div>
      </div>
    </div>`;
  }

  const wrap=document.getElementById('q-content');
  wrap.innerHTML=html;wrap.scrollTop=0;const qc=document.getElementById('q-content');if(qc)qc.scrollTop=0;
  if(window.MathJax && typeof MathJax.typeset === 'function')try{MathJax.typeset([wrap]);}catch(e){}
}

/* PG */
function renderPG(q,i,answered){
  let h='<div class="q-opts">';
  q.opts.forEach((opt,oi)=>{
    let cls='q-opt';
    if(answered){
      if(oi===q.jawab)cls+=' correct';
      else if(S.answers[i]===oi&&oi!==q.jawab)cls+=' wrong';
    }
    h+=`<button class="${cls}" onclick="pickPG(${i},${oi})"${answered?' disabled':''}>
      <span class="q-opt-key">${KEYS[oi]}</span>
      <span class="q-opt-text">${opt}</span>
    </button>`;
  });
  return h+'</div>';
}
function pickPG(qi,oi){
  if(S.answers[qi]!==null||S.done)return;
  S.answers[qi]=oi;S.correct[qi]=oi===S.soal[qi].jawab;
  updateBtn(qi);updateProg();renderQ(qi);
}
/* MMA */
function renderMMA(q,i,answered){
  const jawab = Array.isArray(q.jawabArr) ? q.jawabArr : [q.jawab];
  const temp = S.mmaTemp[i] || [];
  const selected = answered ? (S.answers[i] || []) : temp;

  let h = `<div class="q-mma-note">
    <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="6" cy="6" r="4.5"/><line x1="6" y1="4" x2="6" y2="6.5"/><circle cx="6" cy="8.5" r=".5" fill="currentColor"/></svg>
    Bisa lebih dari satu jawaban benar. Pilih semua, lalu klik Konfirmasi.
  </div><div class="q-mma-opts">`;

  q.opts.forEach((opt, oi) => {
    const isSel = selected.includes(oi);
    const isCorrect = jawab.includes(oi);
    let cls = 'q-mma-opt';
    if(answered){
      if(isSel && isCorrect) cls += ' correct';
      else if(isSel && !isCorrect) cls += ' wrong';
      else if(!isSel && isCorrect) cls += ' missed';
    } else {
      if(isSel) cls += ' sel';
    }
    const dis = answered ? ' disabled' : '';
    h += `<button class="${cls}" onclick="pickMMA(${i},${oi})"${dis}>
      <span class="q-checkbox"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><polyline points="2,5 4,8 8,2"/></svg></span>
      <span>${opt}</span>
    </button>`;
  });

  h += '</div>';
  if(!answered){
    const canConfirm = temp.length > 0;
    h += `<button class="q-confirm-btn" onclick="confirmMMA(${i})"${canConfirm ? '' : ' disabled'} id="mma-confirm-${i}">Konfirmasi Jawaban</button>`;
  }
  return h;
}
function pickMMA(qi, oi){
  if(S.done || S.answers[qi] !== null) return;
  if(!S.mmaTemp[qi]) S.mmaTemp[qi] = [];
  const idx = S.mmaTemp[qi].indexOf(oi);
  if(idx === -1) S.mmaTemp[qi].push(oi);
  else S.mmaTemp[qi].splice(idx, 1);
  const isSel=S.mmaTemp[qi].includes(oi);
  const mbtn=document.querySelector(`[onclick="pickMMA(${qi},${oi})"]`);
  if(mbtn)mbtn.classList.toggle('sel',isSel);
  const mc=document.getElementById(`mma-confirm-${qi}`);
  if(mc)mc.disabled=S.mmaTemp[qi].length===0;
}
function confirmMMA(qi){
  if(S.done) return;
  const temp = S.mmaTemp[qi] || [];
  if(temp.length === 0) return;
  const jawab = Array.isArray(S.soal[qi].jawabArr) ? S.soal[qi].jawabArr : [S.soal[qi].jawab];
  S.answers[qi] = [...temp];
  S.correct[qi] = temp.length === jawab.length && jawab.every(j => temp.includes(j));
  updateBtn(qi); updateProg(); renderQ(qi);
}

/* BS */
function renderBS(q,i,answered){
  const ps=Array.isArray(q.pernyataan)?q.pernyataan:[q.q];
  const js=Array.isArray(q.jawabArr)?q.jawabArr:[q.jawab];
  const ua=S.answers[i]; // array per-pernyataan atau null
  const temp=S.bsTemp&&S.bsTemp[i]?S.bsTemp[i]:Array(ps.length).fill(null);

  let h='';
  h+='<div class="q-bs-list">';
  ps.forEach((p,pi)=>{
    const cur=answered?(ua?ua[pi]:null):(temp[pi]);
    const cor=js[pi];
    let itemCls='q-bs-item';
    let bCls='q-bs-btn', sCls='q-bs-btn';
    if(answered){
      // show correct/wrong
      if(cor==='BENAR'){bCls+=' cor';}else{bCls+=(cur==='BENAR'?' wrg':'')}
      if(cor==='SALAH'){sCls+=' cor';}else{sCls+=(cur==='SALAH'?' wrg':'')}
      if(cur===cor)itemCls+=' item-ok'; else if(cur!==null)itemCls+=' item-ng';
    }else{
      if(cur==='BENAR')bCls+=' sel-b';
      if(cur==='SALAH')sCls+=' sel-s';
    }
    const dis=answered?' disabled':'';
    h+=`<div class="${itemCls}">
      <div class="q-bs-item-text"><span class="q-bs-item-label">${String.fromCharCode(65+pi)}.</span>${p}</div>
      <div class="q-bs-btns">
        <button class="${bCls}" id="bs-b-${i}-${pi}" onclick="pickBS(${i},${pi},'BENAR')"${dis}>Benar</button>
        <button class="${sCls}" id="bs-s-${i}-${pi}" onclick="pickBS(${i},${pi},'SALAH')"${dis}>Salah</button>
      </div>
    </div>`;
  });
  h+='</div>';
  if(!answered){
    const allFilled=temp.every(a=>a!==null);
    h+=`<button class="q-bs-confirm" onclick="confirmBS(${i})"${allFilled?'':' disabled'} id="bs-confirm-${i}">Konfirmasi Jawaban</button>`;
  }
  return h;
}
function pickBS(qi,pi,val){
  if(S.done||S.answers[qi]!==null)return;
  if(!S.bsTemp)S.bsTemp={};
  if(!S.bsTemp[qi]){
    const ps=Array.isArray(S.soal[qi].pernyataan)?S.soal[qi].pernyataan:[S.soal[qi].q];
    S.bsTemp[qi]=Array(ps.length).fill(null);
  }
  if(S.bsTemp[qi][pi]===val){S.bsTemp[qi][pi]=null;}
  else{S.bsTemp[qi][pi]=val;}
  const cur=S.bsTemp[qi][pi];
  const bb=document.getElementById(`bs-b-${qi}-${pi}`);
  const sb=document.getElementById(`bs-s-${qi}-${pi}`);
  if(bb)bb.className='q-bs-btn'+(cur==='BENAR'?' sel-b':'');
  if(sb)sb.className='q-bs-btn'+(cur==='SALAH'?' sel-s':'');
  const bc=document.getElementById(`bs-confirm-${qi}`);
  if(bc)bc.disabled=!S.bsTemp[qi].every(a=>a!==null);
}
function confirmBS(qi){
  const q=S.soal[qi];
  const ps=Array.isArray(q.pernyataan)?q.pernyataan:[q.q];
  const js=Array.isArray(q.jawabArr)?q.jawabArr:[q.jawab];
  const temp=S.bsTemp&&S.bsTemp[qi]?S.bsTemp[qi]:[];
  if(!temp.every(a=>a!==null))return;
  S.answers[qi]=[...temp];
  S.correct[qi]=temp.every((a,idx)=>a===js[idx]);
  updateBtn(qi);updateProg();renderQ(qi);
}

/* Mark */
function mark(i){
  S.marked[i]=!S.marked[i];
  saveMarks();
  const nb=document.getElementById('nb'+i);if(nb)nb.classList.toggle('mk',S.marked[i]);
  const b=document.getElementById('tm'+i);if(!b)return;
  b.classList.toggle('on',S.marked[i]);
  b.innerHTML=`<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 2h6v9l-3-2.2L4 11V2z"/></svg>${S.marked[i]?'Ditandai':'Tandai Soal'}`;
}

/* Toggle pembahasan */
function togglePem(i){document.getElementById('pem'+i)?.classList.toggle('open');}

/* Score */
function showScore(){
  S.done=true;
  const tot=S.soal.length;
  const ok=S.correct.filter(c=>c===true).length;
  const ng=tot-ok;
  const nilai=Math.round(ok/tot*100);
  let label='Perlu Latihan Lagi',msg='Masih banyak soal yang perlu diulangi. Baca kembali materinya, lalu coba lagi!';
  if(nilai>=90){label='Luar Biasa! 🎉';msg='Penguasaan soal sangat baik. Kamu siap ke paket berikutnya!';}
  else if(nilai>=75){label='Sangat Baik!';msg='Hampir sempurna — teliti lagi soal yang salah, pasti bisa 100!';}
  else if(nilai>=60){label='Cukup Baik';msg='Sudah melewati batas tuntas. Ulas soal yang salah untuk memperkuat pemahamanmu.';}
  else if(nilai>=40){label='Perlu Penguatan';msg='Beberapa konsep perlu diperkuat. Pelajari kembali materinya sebelum mencoba lagi.';}
  const firstWrong=S.correct.findIndex(c=>c===false);
  const reviewBtn=firstWrong>=0?`<button class="q-done-btn" onclick="reviewWrong()"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 7s2.2-4 6-4 6 4 6 4-2.2 4-6 4-6-4-6-4z"/><circle cx="7" cy="7" r="1.6"/></svg>Tinjau soal salah</button>`:'';
  const ov=document.createElement('div');
  ov.className='q-done-ov';ov.id='q-done-ov';
  ov.innerHTML=`
    <div class="q-done-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="5,13 10,18 19,7"/></svg></div>
    <div class="q-done-title">${label}</div>
    <div class="q-done-msg">${msg}</div>
    <div class="q-done-stats">
      <div class="q-done-stat"><span class="q-done-n g">${ok}</span><span class="q-done-l">Benar</span></div>
      <div class="q-done-stat"><span class="q-done-n r">${ng}</span><span class="q-done-l">Salah</span></div>
      <div class="q-done-stat"><span class="q-done-n">${nilai}</span><span class="q-done-l">Nilai</span></div>
    </div>
    <div class="q-done-acts">
      ${reviewBtn}
      <button class="q-done-btn" onclick="location.reload()"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7a5 5 0 1 1-1.6-3.7M12 2v2.6H9.4"/></svg>Ulangi</button>
      <button class="q-done-btn p" onclick="window.location.href='../'"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 3 4.5 7l4 4"/></svg>Kembali</button>
    </div>`;
  document.getElementById('q-layout').appendChild(ov);
  document.getElementById('q-nav').style.display='none';const mn2=document.getElementById('q-mob-nav');if(mn2)mn2.style.display='none';const ms2=document.getElementById('q-mob-strip');if(ms2)ms2.style.display='none';
}
function reviewWrong(){
  S.review=true;
  const ov=document.getElementById('q-done-ov');if(ov)ov.remove();
  document.getElementById('q-nav').style.display='';
  const mn=document.getElementById('q-mob-nav');if(mn)mn.style.display='';
  const ms=document.getElementById('q-mob-strip');if(ms)ms.style.display='';
  const fw=S.correct.findIndex(c=>c===false);
  goTo(fw>=0?fw:0);
}

/* Sidebar mobile */
function toggleSb(){
  document.getElementById('q-sb').classList.toggle('open');
  document.getElementById('q-sb-ov').classList.toggle('open');
}
function closeSb(){
  document.getElementById('q-sb').classList.remove('open');
  document.getElementById('q-sb-ov').classList.remove('open');
}

/* Theme */
function toggleTheme(){
  const h=document.documentElement,btn=document.getElementById('themeBtn');
  const dark=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',dark?'light':'dark');
  localStorage.setItem('eksaktalab-theme',dark?'light':'dark');
  btn.textContent=dark?'🌙 Gelap':'☀️ Terang';
}

/* Keyboard */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')go(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')go(-1);
  if(['1','2','3','4'].includes(e.key)&&!S.done){
    const q=S.soal[S.cur];
    if(q&&q.type==='pg'&&S.answers[S.cur]===null)pickPG(S.cur,parseInt(e.key)-1);
  }
});


// ── Mobile strip: build dan update ──────────────────────────────────
function buildMobStrip(){
  const inner = document.getElementById('q-mob-strip-inner');
  if(!inner) return;
  const tot = document.getElementById('mob-q-tot');
  if(tot) tot.textContent = S.soal.length;
  inner.innerHTML = S.soal.map((_,i) =>
    `<button class="q-mob-num${i===0?' cur':''}" id="mn${i}" onclick="goTo(${i})">${i+1}</button>`
  ).join('');
}

function updateMobNum(i){
  const b = document.getElementById('mn'+i);
  if(!b) return;
  b.className = 'q-mob-num';
  if(i === S.cur) b.classList.add('cur');
  if(S.correct[i] === true)  b.classList.add('ok');
  if(S.correct[i] === false) b.classList.add('ng');
}

function updateMobNav(i){
  const prev = document.getElementById('mob-btn-prev');
  const cur  = document.getElementById('mob-q-cur');
  const next = document.getElementById('mob-btn-next');
  const isLast = i === S.soal.length - 1;
  if(prev) prev.disabled = (i === 0);
  if(cur)  cur.textContent = i + 1;
  if(next){
    if(isLast){
      next.innerHTML = 'Selesai<span class="q-mob-arrow"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="2,7 5,9.5 8,4"/></svg></span>';
      next.onclick = showScore;
    } else {
      next.innerHTML = 'Selanjutnya<span class="q-mob-arrow"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="3,2 7,5 3,8"/></svg></span>';
      next.onclick = () => go(1);
    }
  }
  // Auto-scroll strip ke nomor aktif
  const mn = document.getElementById('mn'+i);
  if(mn) mn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

init();

// ── Scroll progress bar ─────────────────────────────────
window.addEventListener('scroll', () => {
  const el  = document.documentElement;
  const pct = el.scrollTop / (el.scrollHeight - el.clientHeight) * 100;
  const sb  = document.getElementById('scroll-bar');
  if (sb) sb.style.width = pct + '%';
});
</script>
</body>
</html>
