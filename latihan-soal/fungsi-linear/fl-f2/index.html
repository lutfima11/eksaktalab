<script>window.quizDB={"fl-f2":{"title":"Aplikasi dalam Kehidupan · Paket 2","kode":"FL-F2","soal":[{"type":"pg","level":"Beginner","q":"Sebuah lilin sepanjang 30 cm berkurang 2 cm setiap jam. Persamaannya: $ y = -2x + 30 $ ( $ y $ cm, $ x $ jam). Panjang lilin setelah 8 jam adalah …","opts":["$ 46 $ cm","$ 30 $ cm","$ 22 $ cm","$ 14 $ cm","$ 10 $ cm"],"jawab":3,"p":"$ y = -2(8) + 30 = -16 + 30 = 14 $ cm.","subMateri":"","kesalahanUmum":"menghitung -2×8+30=14 bukannya -2(8)+30=14? Cek: -2*8+30=14 bukan 46"},{"type":"pg","level":"Beginner","q":"Sebuah gudang menyimpan 80 kg beras. Setiap hari digunakan 5 kg. Model: $ y = -5x + 80 $ . Beras akan habis setelah …","opts":["$ 12 $ hari","$ 14 $ hari","$ 16 $ hari","$ 18 $ hari","$ 20 $ hari"],"jawab":2,"p":"$ -5x + 80 = 0 \\Rightarrow x = 16 $ hari.","subMateri":"","kesalahanUmum":"menghitung 80/5=16, mengabaikan bahwa hasilnya waktu bukan sisa"},{"type":"pg","level":"Beginner","q":"Hubungan suhu Fahrenheit ( $ F $ ) dan Celsius ( $ C $ ): $ F = \\dfrac{9}{5}C + 32 $ . Suhu $ 37^\\circ $ C dalam Fahrenheit adalah …","opts":["$ 95^\\circ $ F","$ 96{,}6^\\circ $ F","$ 98{,}6^\\circ $ F","$ 100^\\circ $ F","$ 102^\\circ $ F"],"jawab":2,"p":"$ F = \\tfrac{9}{5}(37) + 32 = \\tfrac{333}{5} + 32 = 66{,}6 + 32 = 98{,}6^\\circ $ F.","subMateri":"","kesalahanUmum":"menggunakan C=5/9(F-32) bukan F=9/5C+32 saat mencari F dari C"},{"type":"pg","level":"Beginner","q":"Perhatikan tabel berikut. \\begin{center} \\begin{tabular}{|c|c|} $ x $ (hari) & $ y $ (unit terjual)\\ $ 1 $ & $ 7 $ \\ $ 3 $ & $ 13 $ \\ $ 5 $ & $ 19 $ \\ \\end{tabular} \\end{center} Model fungsi linear dan nilai $ y $ saat $ x = 7 $ adalah …","opts":["$ y = 3x+4 $ ; $ y(7) = 25 $","$ y = 3x+4 $ ; $ y(7) = 28 $","$ y = 3x+2 $ ; $ y(7) = 23 $","$ y = 4x+3 $ ; $ y(7) = 31 $","$ y = 2x+5 $ ; $ y(7) = 19 $"],"jawab":0,"p":"Dari tabel, $ m = (13-7)/(3-1) = 3 $ ; $ c = 7-3(1) = 4 $ . Model $ y = 3x+4 $ ; $ y(7) = 3(7)+4 = 25 $ .","subMateri":"","kesalahanUmum":"membaca pola tabel hanya dari dua baris pertama tanpa memverifikasi ke baris lain"},{"type":"pg","level":"Intermediate","q":"Biaya produksi: $ C(x) = 3.000x + 15.000 $ (rupiah). Harga jual per unit: Rp8.000. Unit minimum yang harus dijual agar tidak rugi adalah …","opts":["$ 2 $ unit","$ 3 $ unit","$ 4 $ unit","$ 5 $ unit","$ 6 $ unit"],"jawab":1,"p":"BEP: $ 3.000x + 15.000 = 8.000x \\Rightarrow 5.000x = 15.000 \\Rightarrow x = 3 $ . Minimal $ 3 $ unit.","subMateri":"","kesalahanUmum":"menghitung BEP = biaya tetap / harga jual bukan (biaya tetap)/(harga-biaya variabel)"},{"type":"pg","level":"Intermediate","q":"Sebuah tangki berisi 500 liter air. Air dipompa keluar sebesar 20 liter per menit. Waktu (menit) saat tangki tersisa 100 liter adalah …","opts":["$ 15 $ menit","$ 18 $ menit","$ 20 $ menit","$ 22 $ menit","$ 25 $ menit"],"jawab":2,"p":"$ -20x + 500 = 100 \\Rightarrow 20x = 400 \\Rightarrow x = 20 $ menit.","subMateri":"","kesalahanUmum":"menghitung t=(500-100)/20=20 langsung tanpa memperhatikan persamaan model"},{"type":"pg","level":"Intermediate","q":"Biaya produksi: $ C(x) = 2.000x + 10.000 $ (ribuan rupiah). Harga jual per unit: Rp5.000 ribu. Fungsi laba $ L(x) $ dan jumlah unit agar laba minimal Rp5.000 ribu adalah …","opts":["$ L=3.000x-10.000 $ ; minimal $ 5 $ unit","$ L=3.000x-10.000 $ ; minimal $ 6 $ unit","$ L=3.000x+10.000 $ ; minimal $ 5 $ unit","$ L=5.000x-10.000 $ ; minimal $ 3 $ unit","$ L=3.000x-10.000 $ ; minimal $ 4 $ unit"],"jawab":0,"p":"$ L(x) = R-C = 5.000x - (2.000x+10.000) = 3.000x - 10.000 $ . $ 3.000x - 10.000 \\geq 5.000 \\Rightarrow x \\geq 5 $ . Minimal $ 5 $ unit.","subMateri":"","kesalahanUmum":"menghitung laba = R - biaya variabel, tanpa memasukkan biaya tetap"},{"type":"pg","level":"Intermediate","q":"Program diet: berat awal 70 kg, berkurang 0,5 kg per minggu. Waktu yang diperlukan agar berat turun menjadi 65 kg adalah …","opts":["$ 6 $ minggu","$ 8 $ minggu","$ 10 $ minggu","$ 12 $ minggu","$ 14 $ minggu"],"jawab":0,"p":"$ -0{,}5t+70=65 \\Rightarrow -0{,}5t=-5 \\Rightarrow t=10 $ minggu.","subMateri":"","kesalahanUmum":"menghitung W(12) dengan W=70-12*0.5 benar, tapi pertanyaan ditanya kapan W=65"},{"type":"pg","level":"Expert","q":"Produsen memiliki biaya produksi $ C(x) = 1.500x + 18.000 $ . Jika BEP tercapai saat $ x = 12 $ unit, harga jual per unit adalah …","opts":["Rp2.000","Rp2.500","Rp3.000","Rp3.500","Rp4.000"],"jawab":2,"p":"BEP $ x=12 $ : $ R(12) = C(12) $ . $ p \\cdot 12 = 1.500(12)+18.000 = 18.000+18.000 = 36.000 $ . $ p = 36.000/12 = 3.000 $ .","subMateri":"","kesalahanUmum":"menghitung harga jual dari BEP menggunakan rumus yang salah"},{"type":"pg","level":"Expert","q":"Sebuah usaha memiliki $ C(x) = 4.000x + 30.000 $ dan $ R(x) = 7.000x $ . BEP saat ini adalah 10 unit. Pemilik ingin menurunkan BEP menjadi 8 unit tanpa mengubah harga jual dan biaya variabel. Biaya tetap maksimum yang diizinkan adalah …","opts":["Rp20.000","Rp22.000","Rp24.000","Rp26.000","Rp28.000"],"jawab":2,"p":"BEP = $ k/(7.000-4.000)=k/3.000=8 \\Rightarrow k=24.000 $ . Biaya tetap maksimum: <b>Rp24.000</b>.","subMateri":"","kesalahanUmum":"hanya membandingkan BEP tanpa mempertimbangkan arah optimasinya"}]}};</script>
