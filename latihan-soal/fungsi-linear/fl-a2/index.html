<script>window.quizDB={"fl-a2":{"title":"Pengertian Fungsi Linear · Paket 2","kode":"FL-A2","soal":[{"type":"pg","level":"Beginner","q":"Pada fungsi linear $ f(x) = 4x - 9 $ , nilai $ m $ dan $ c $ berturut-turut adalah …","opts":["$ m = -4 $ , $ c = 9 $","$ m = 4 $ , $ c = 9 $","$ m = 9 $ , $ c = -4 $","$ m = 4 $ , $ c = -9 $","$ m = -9 $ , $ c = 4 $"],"jawab":3,"p":"Pada $ f(x) = 4x - 9 $ : koefisien $ x $ adalah $ m = 4 $ dan konstanta bebas adalah $ c = -9 $ .","subMateri":"","kesalahanUmum":"mengira m = −9 dan c = 4 (tertukar tanda/posisi)"},{"type":"pg","level":"Beginner","q":"Diketahui $ f(x) = 3x + k $ dan $ f(4) = 17 $ . Nilai $ k $ adalah …","opts":["$ 29 $","$ 7 $","$ 5 $","$ 3 $","$ 1 $"],"jawab":2,"p":"Substitusi $ x = 4 $ : $ f(4) = 3(4) + k = 12 + k = 17 \\Rightarrow k = 5 $ .","subMateri":"","kesalahanUmum":"menghitung k = 17 + 12 = 29 (penjumlahan bukan pengurangan)"},{"type":"pg","level":"Beginner","q":"Titik potong garis $ y = 4x - 8 $ dengan sumbu $ Y $ adalah …","opts":["$ (2,\\; 0) $","$ (0,\\; 8) $","$ (8,\\; 0) $","$ (0,\\; -8) $","$ (-2,\\; 0) $"],"jawab":3,"p":"Titik potong sumbu $ Y $ : substitusi $ x = 0 $ , maka $ y = 4(0) - 8 = -8 $ . Titik potong $ = (0,\\,-8) $ .","subMateri":"","kesalahanUmum":"mengira titik potong sumbu Y adalah saat y=0, bukan x=0"},{"type":"pg","level":"Beginner","q":"Perhatikan pernyataan berikut! $ y = 7 $ adalah fungsi linear dengan $ m = 0 $ $ y = -x + 4 $ adalah fungsi linear dengan gradien $ -1 $ $ x = 3 $ adalah fungsi linear dalam $ x $ $ y = \\tfrac{2}{3}x $ adalah fungsi linear dengan $ c = 0 $ Pernyataan yang <b>benar</b> adalah …","opts":["(i) dan (ii)","(i) dan (iii)","(ii) dan (iv)","(ii) dan (iii)","(i), (ii), dan (iv)"],"jawab":2,"p":"Pernyataan (ii): $ y = -x + 4 $ adalah FL dengan $ m = -1 \\neq 0 $ ✓. Pernyataan (iv): $ y = \\tfrac{2}{3}x $ adalah FL dengan $ m = \\tfrac{2}{3} $ , $ c = 0 $ ✓. Pernyataan (i) salah karena $ m = 0 $ membuat fungsi konstan, bukan linear. Pernyataan (iii) salah karena $ x = 3 $ adalah garis vertikal, bukan fungsi.","subMateri":"","kesalahanUmum":"mengira m=0 tetap menghasilkan fungsi linear;"},{"type":"pg","level":"Intermediate","q":"Diketahui $ f(x) = mx - 2 $ dan $ f(3) = 10 $ . Nilai $ m $ adalah …","opts":["$ \\dfrac{8}{3} $","$ 3 $","$ 4 $","$ 5 $","$ 6 $"],"jawab":2,"p":"$ f(3) = 3m - 2 = 10 \\Rightarrow 3m = 12 \\Rightarrow m = 4 $ .","subMateri":"","kesalahanUmum":"menghitung m = (10−2)/3 = 8/3 (lupa konstanta −2)"},{"type":"pg","level":"Intermediate","q":"Perhatikan grafik garis $ y = -\\dfrac{1}{2}x + 3 $ pada bidang Cartesius. \\begin{center} [GAMBAR] \\end{center} Luas segitiga yang dibentuk oleh garis tersebut bersama sumbu $ X $ dan sumbu $ Y $ adalah …","opts":["$ 6 $ satuan luas","$ 7 $ satuan luas","$ 8 $ satuan luas","$ 9 $ satuan luas","$ 18 $ satuan luas"],"jawab":3,"p":"Titik potong sumbu $ X $ : $ 0 = -\\tfrac{1}{2}x + 3 \\Rightarrow x = 6 $ , sehingga $ (6,\\,0) $ . Titik potong sumbu $ Y $ : $ x = 0 \\Rightarrow y = 3 $ , sehingga $ (0,\\,3) $ . Luas segitiga $ = \\tfrac{1}{2} \\times 6 \\times 3 = 9 $ satuan luas.","subMateri":"","kesalahanUmum":"menghitung luas = alas × tinggi tanpa dibagi 2"},{"type":"pg","level":"Intermediate","q":"Diketahui fungsi linear $ f(x) = ax + b $ memenuhi $ f(1) = 5 $ dan $ f(-1) = -1 $ . Nilai $ a + b $ adalah …","opts":["$ 2 $","$ 3 $","$ 4 $","$ 5 $","$ 6 $"],"jawab":3,"p":"Dari dua kondisi: \\[a + b = 5 \\text{dan} -a + b = -1.\\] Kurangi persamaan kedua dari pertama: $ 2a = 6 \\Rightarrow a = 3 $ , $ b = 2 $ . Maka $ a + b = 5 $ .","subMateri":"","kesalahanUmum":"hanya menggunakan salah satu kondisi; tidak membentuk SPLDV"},{"type":"pg","level":"Intermediate","q":"Diketahui persamaan garis $ 3x + 2y = 18 $ . Titik potong dengan sumbu $ X $ dan sumbu $ Y $ berturut-turut adalah …","opts":["$ (9,\\;0) $ dan $ (0,\\;6) $","$ (6,\\;0) $ dan $ (0,\\;9) $","$ (6,\\;0) $ dan $ (0,\\;3) $","$ (3,\\;0) $ dan $ (0,\\;9) $","$ (0,\\;6) $ dan $ (9,\\;0) $"],"jawab":1,"p":"Titik potong sumbu $ X $ : $ 3x = 18 \\Rightarrow x = 6 $ , sehingga $ (6,\\,0) $ . Titik potong sumbu $ Y $ : $ 2y = 18 \\Rightarrow y = 9 $ , sehingga $ (0,\\,9) $ .","subMateri":"","kesalahanUmum":"membalik titik potong sumbu X dan sumbu Y"},{"type":"pg","level":"Expert","q":"Diketahui $ f(x) = 3x + k $ dan $ g(x) = -2x + m $ . Jika $ f(2) = g(2) = 8 $ , maka nilai $ k + m $ adalah …","opts":["$ 10 $","$ 12 $","$ 14 $","$ 16 $","$ 18 $"],"jawab":2,"p":"$ f(2) = 3(2) + k = 6 + k = 8 \\Rightarrow k = 2 $ . $ g(2) = -2(2) + m = -4 + m = 8 \\Rightarrow m = 12 $ . Maka $ k + m = 2 + 12 = 14 $ .","subMateri":"","kesalahanUmum":"menghitung k dan m secara terpisah tanpa memperhatikan syarat"},{"type":"pg","level":"Expert","q":"Perhatikan grafik fungsi linear berikut. \\begin{center} [GAMBAR] \\end{center} Persamaan fungsi linear yang sesuai dengan grafik di atas adalah …","opts":["$ f(x) = \\dfrac{3}{2}x - 3 $","$ f(x) = -\\dfrac{2}{3}x - 3 $","$ f(x) = -\\dfrac{3}{2}x - 3 $","$ f(x) = \\dfrac{2}{3}x + 3 $","$ f(x) = \\dfrac{3}{2}x + 3 $"],"jawab":2,"p":"Garis melalui $ (0,\\,-3) $ dan $ (-2,\\,0) $ : \\[m = \\frac{0 - (-3)}{-2 - 0} = \\frac{3}{-2} = -\\frac{3}{2}.\\] Karena $ c = -3 $ (dari titik $ (0,\\,-3) $ ), persamaannya adalah $ f(x) = -\\dfrac{3}{2}x - 3 $ . Verifikasi: $ f(-2) = -\\tfrac{3}{2}(-2) - 3 = 3 - 3 = 0 $ ✓.","subMateri":"","kesalahanUmum":"mengira gradien positif karena garis terlihat \"tinggi\";"}]}};</script>
