<script>window.quizDB={"fl-a1":{"title":"Pengertian Fungsi Linear · Paket 1","kode":"FL-A1","soal":[{"type":"pg","level":"Beginner","q":"Pernyataan yang <b>merupakan fungsi linear</b> adalah …","opts":["$ y = x^2 - 3 $","$ y = 5 $","$ y = 2x - 7 $","$ x = 4 $","$ y = \\dfrac{1}{x} + 2 $"],"jawab":2,"p":"Di antara pilihan, hanya $ y = 2x - 7 $ yang berbentuk $ y = mx + c $ dengan $ m \\neq 0 $ . Perhatikan: $ y = 5 $ adalah fungsi konstan ( $ m = 0 $ ), $ y = x^2 - 3 $ berderajat dua, $ x = 4 $ bukan fungsi, dan $ y = 1/x + 2 $ tidak linear.","subMateri":"","kesalahanUmum":"mengira y=5 adalah fungsi linear karena berbentuk y=...;"},{"type":"pg","level":"Beginner","q":"Diketahui $ f(x) = 5x - 3 $ . Nilai $ f(3) $ adalah …","opts":["$ 0 $","$ 7 $","$ 10 $","$ 12 $","$ 18 $"],"jawab":3,"p":"$ f(3) = 5(3) - 3 = 15 - 3 = 12 $ .","subMateri":"","kesalahanUmum":"menghitung 5×3−3 = 5×0 = 0 (lupa urutan operasi)"},{"type":"pg","level":"Beginner","q":"Diketahui $ f(x) = 3x - 1 $ dengan domain $ \\{-1,\\, 0,\\, 1,\\, 2\\} $ . Range fungsi tersebut adalah …","opts":["$ \\{-4,\\; -1,\\; 2,\\; 5\\} $","$ \\{-4,\\; 0,\\; 2,\\; 5\\} $","$ \\{-2,\\; -1,\\; 0,\\; 1\\} $","$ \\{-3,\\; 0,\\; 3,\\; 6\\} $","$ \\{4,\\; 1,\\; -2,\\; -5\\} $"],"jawab":0,"p":"Hitung $ f(x) = 3x - 1 $ untuk tiap elemen domain: \\[f(-1) = -4, f(0) = -1, f(1) = 2, f(2) = 5.\\] Range $ = \\{-4,\\,-1,\\,2,\\,5\\} $ .","subMateri":"","kesalahanUmum":"menukar domain dan range; atau hanya menghitung sebagian nilai"},{"type":"pg","level":"Beginner","q":"Titik potong garis $ y = 3x - 9 $ dengan sumbu $ X $ adalah …","opts":["$ (0,\\; -9) $","$ (9,\\; 0) $","$ (3,\\; 0) $","$ (0,\\; 3) $","$ (-3,\\; 0) $"],"jawab":2,"p":"Titik potong sumbu $ X $ : substitusi $ y = 0 $ , maka $ 0 = 3x - 9 \\Rightarrow x = 3 $ . Titik potong $ = (3,\\,0) $ .","subMateri":"","kesalahanUmum":"membalik perhitungan: −(−9)/3 = 9 bukan 3"},{"type":"pg","level":"Intermediate","q":"Persamaan $ 2x - 3y + 12 = 0 $ diubah ke bentuk $ y = mx + c $ . nUmum":"hanya mencari salah satu parameter; lupa mengecek keduanya"},{"type":"pg","level":"Expert","q":"Diketahui $ f(x) = 2x - 1 $ untuk $ 1 \\leq x \\leq 4 $ , $ x \\in \\mathbb{R} $ . Range fungsi tersebut adalah …","opts":["$ 1 \\leq f(x) \\leq 7 $","$ 1 \\leq f(x) \\leq 8 $","$ 0 \\leq f(x) \\leq 7 $","$ 2 \\leq f(x) \\leq 8 $","$ -1 \\leq f(x) \\leq 7 $"],"jawab":0,"p":"$ f(x) = 2x - 1 $ naik pada $ [1,\\,4] $ : \\[f(1) = 2(1) - 1 = 1, \\qquad f(4) = 2(4) - 1 = 7.\\] Karena domain kontinu, range $ = [1,\\,7] $ , yaitu $ 1 \\leq f(x) \\leq 7 $ .","subMateri":"","kesalahanUmum":"mengira range kontinu sama dengan domain kontinu;"}]}};</script>
