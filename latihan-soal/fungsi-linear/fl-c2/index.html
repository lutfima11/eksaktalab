uan luas","$ 6 $ satuan luas","$ 8 $ satuan luas","$ 16 $ satuan luas"],"jawab":1,"p":"Substitusi $ y=0 $ : $ 2x=4 \\Rightarrow x=2 $ ; substitusi $ x=0 $ : $ y=-4 $ . Luas $ = \\tfrac{1}{2} \\times 2 \\times 4 = 4 $ satuan luas.","subMateri":"","kesalahanUmum":"menghitung luas = 2 × 4 tanpa dikali 1/2"},{"type":"pg","level":"Expert","q":"Diketahui garis $ g_1: y = 3x - 1 $ dan $ g_2: y = -x + 7 $ berpotongan di titik $ P $ . Persamaan garis dengan gradien $ 2 $ yang melalui titik $ P $ adalah …","opts":["$ y = 2x + 3 $","$ y = 2x + 1 $","$ y = 2x - 1 $","$ y = 2x - 3 $","$ y = 2x + 5 $"],"jawab":1,"p":"Titik potong $ g_1 $ dan $ g_2 $ : $ 3x-1=-x+7 \\Rightarrow 4x=8 \\Rightarrow x=2 $ , $ y=5 $ . Garis baru: $ m=2 $ melalui $ (2,5) $ : $ y-5=2(x-2) \\Rightarrow y=2x+1 $ .","subMateri":"","kesalahanUmum":"mencari titik potong tapi lupa menggunakan gradien baru untuk garis ketiga"},{"type":"pg","level":"Expert","q":"Perhatikan grafik berikut. \\begin{center} [GAMBAR] \\end{center} Diketahui luas segitiga yang dibentuk garis tersebut bersama sumbu $ X $ dan $ Y $ adalah $ 6 $ satuan luas. Nilai $ b $ dan persamaan garisnya adalah …","opts":["$ b = 2 $ ; $ f(x) = \\dfrac{2}{3}x + 2 $","$ b = 3 $ ; $ f(x) = x + 3 $","$ b = 4 $ ; $ f(x) = \\dfrac{4}{3}x + 4 $","$ b = 6 $ ; $ f(x) = 2x + 6 $","$ b = 4 $ ; $ f(x) = -\\dfrac{4}{3}x + 4 $"],"jawab":2,"p":"Luas segitiga $ = \\tfrac{1}{2} \\times 3 \\times b = 6 \\Rightarrow b = 4 $ . Garis melalui $ (-3,0) $ dan $ (0,4) $ : $ m = \\dfrac{4-0}{0-(-3)} = \\dfrac{4}{3} $ . Persamaan: $ f(x) = \\dfrac{4}{3}x + 4 $ . Verifikasi: $ f(-3) = \\tfrac{4}{3}(-3)+4 = 0 $ ✓.","subMateri":"","kesalahanUmum":"mengira b langsung bisa dibaca tanpa menghitung dari luas"}]}};</script>
