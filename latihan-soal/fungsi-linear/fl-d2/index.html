 k = 0 $","$ k = 1 $","$ k = 2 $","$ k = -2 $"],"jawab":1,"p":"$ m_\\ell = k^2-1 $ . Tegak lurus $ y=x+2 $ (m=1): $ (k^2-1)\\times 1=-1 \\Rightarrow k^2=0 \\Rightarrow k=0 $ .","subMateri":"","kesalahanUmum":"mensubstitusi k²-1=m dan k=0 tanpa memeriksa kondisi tegak lurus"},{"type":"pg","level":"Expert","q":"Suatu garis melalui titik $ (2,\\,3) $ dan membentuk segitiga bersama sumbu $ X $ dan $ Y $ dengan luas $ 12 $ satuan luas. Titik potong garis tersebut dengan sumbu $ X $ adalah $ (a,\\,0) $ dengan $ a > 0 $ dan titik potong dengan sumbu $ Y $ adalah $ (0,\\,b) $ dengan $ b > 0 $ . Persamaan garis yang memenuhi adalah …","opts":["$ 3x + 2y = 12 $","$ x + 2y = 8 $","$ 2x + y = 7 $","$ x + y = 5 $","$ 2x + 3y = 13 $"],"jawab":0,"p":"Luas $ = \\tfrac{1}{2}ab = 12 \\Rightarrow ab=24 $ . Garis melalui $ (2,3) $ : $ \\tfrac{2}{a}+\\tfrac{3}{b}=1 $ . Substitusi $ b=24/a $ : $ \\tfrac{2}{a}+\\tfrac{3a}{24}=1 \\Rightarrow 48+3a^2=24a \\Rightarrow a^2-8a+16=0 \\Rightarrow (a-4)^2=0 \\Rightarrow a=4, b=6 $ . Persamaan: $ \\tfrac{x}{4}+\\tfrac{y}{6}=1 \\Rightarrow 3x+2y=12 $ .","subMateri":"","kesalahanUmum":"mengira a=4 langsung dari luas, tidak membentuk persamaan 2/a+3/b=1 dulu"}]}};</script>
