_2 \\perp \\ell_3 $","$ \\ell_1 \\perp \\ell_3 $ dan $ \\ell_2 \\parallel \\ell_3 $"],"jawab":2,"p":"$ m_1=3 $ ; $ \\ell_2: y=-\\tfrac{1}{3}x+3 $ , $ m_2=-\\tfrac{1}{3} $ ; $ m_3=3 $ . $ m_1 \\times m_2 = 3 \\times (-\\tfrac{1}{3}) = -1 $ $ \\Rightarrow \\ell_1 \\perp \\ell_2 $ ; $ m_1=m_3=3 $ , $ c_1 \\neq c_3 $ $ \\Rightarrow \\ell_1 \\parallel \\ell_3 $ .","subMateri":"","kesalahanUmum":"hanya memeriksa pasangan pertama; tidak memeriksa semua kombinasi"},{"type":"pg","level":"Expert","q":"Diketahui $ \\ell_1: (a+2)x - 3y + 6 = 0 $ dan $ \\ell_2: 4x + (a-1)y - 8 = 0 $ saling <b>tegak lurus</b>. Nilai $ a $ adalah …","opts":["$ a = -13 $","$ a = -11 $","$ a = -9 $","$ a = 11 $","$ a = 13 $"],"jawab":1,"p":"$ m_1=(a+2)/3 $ ; $ m_2=-4/(a-1) $ . Tegak lurus: $ \\dfrac{a+2}{3} \\times \\dfrac{-4}{a-1}=-1 \\Rightarrow -4(a+2)=-3(a-1) \\Rightarrow -4a-8=-3a+3 \\Rightarrow -a=11 \\Rightarrow a=-11 $ .","subMateri":"","kesalahanUmum":"menghitung m1*m2=-1 dengan aljabar tapi salah mengelola tanda min saat (a+2)(a-1)"}]}};</script>
