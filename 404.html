<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Halaman Tidak Ditemukan · EksaktaLab</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0A0F1E;--teal:#00BFA5;--teal-dim:#009E87;
  --surface:#FFFFFF;--surface-2:#F0F4FF;--surface-3:#E8EEFF;
  --text:#0A0F1E;--text-2:#3D4A6B;--text-3:#7B8BB2;--border:#D8E0F5;
  --sans:'Inter',system-ui,sans-serif;
  --display:'Space Grotesk',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --radius:12px;
}
[data-theme="dark"]{
  --surface:#0A0F1E;--surface-2:#141929;--surface-3:#1E2640;
  --text:#EEF1FF;--text-2:#A8B4D8;--text-3:#5C6A8C;--border:#263050;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sans);background:var(--surface);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
.navbar{
  position:sticky;top:0;z-index:50;background:var(--surface);
  border-bottom:1px solid var(--border);padding:0 2rem;height:60px;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-logo{display:flex;align-items:center;gap:0.6rem;text-decoration:none;}
.nav-logo-icon{width:30px;height:30px;border-radius:8px;background:var(--teal);display:flex;align-items:center;justify-content:center;}
.nav-logo-name{font-family:var(--display);font-size:1rem;font-weight:700;color:var(--text);}
.nav-logo-name em{font-style:normal;color:var(--teal);}
.nav-logo-tag{font-family:var(--mono);font-size:0.5rem;color:var(--text-3);letter-spacing:.1em;text-transform:uppercase;}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem;}
.wrap{max-width:480px;text-align:center;}
.code{
  font-family:var(--mono);font-size:5rem;font-weight:700;
  color:var(--teal);line-height:1;letter-spacing:-.04em;
  margin-bottom:0.5rem;
}
.title{font-family:var(--display);font-size:1.5rem;font-weight:700;color:var(--text);margin-bottom:0.75rem;}
.desc{font-size:0.9rem;color:var(--text-2);line-height:1.6;margin-bottom:2rem;}
.actions{display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;}
.btn{
  display:inline-flex;align-items:center;gap:0.4rem;
  padding:0.6rem 1.25rem;border-radius:var(--radius);
  font-size:0.85rem;font-weight:600;text-decoration:none;
  border:1px solid var(--border);background:var(--surface-2);color:var(--text-2);
  transition:all .2s;cursor:pointer;font-family:var(--sans);
}
.btn:hover{border-color:var(--teal);color:var(--teal);}
.btn.primary{background:var(--teal);color:#fff;border-color:var(--teal);}
.btn.primary:hover{background:var(--teal-dim);}
</style>
</head>
<body>
<nav class="navbar">
  <a class="nav-logo" href="./">
    <div class="nav-logo-icon">
      <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
        <path d="M4 8h8M4 12h16M4 16h8" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M16 6l4 6-4 6" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div>
      <div class="nav-logo-name">Eksakta<em>Lab</em></div>
      <div class="nav-logo-tag">Lab Belajar Matematika</div>
    </div>
  </a>
</nav>

<main class="main">
  <div class="wrap">
    <div class="code">404</div>
    <h1 class="title">Halaman Tidak Ditemukan</h1>
    <p class="desc">Sepertinya halaman yang kamu cari tidak ada — mungkin URL salah, atau materi sedang dalam pengerjaan. Kembali ke beranda dan temukan materi yang kamu butuhkan.</p>
    <div class="actions">
      <a href="./"\1class="btn primary">← Ke Beranda</a>
      <a href="materi/fungsi-linear/" class="btn">Fungsi Linear</a>
      <a href="materi/fungsi-komposisi-invers/" class="btn">Fungsi Komposisi</a>
    </div>
  </div>
</main>
</body>
</html>
