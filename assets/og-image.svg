<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0d1b2e"/>
  <!-- Grid dots subtle -->
  <defs>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.2" fill="#1e3a5f" opacity="0.6"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Teal accent bar kiri -->
  <rect x="0" y="0" width="6" height="630" fill="#00bfa5"/>
  <!-- Logo icon area -->
  <rect x="80" y="200" width="100" height="100" rx="18" fill="#162032"/>
  <line x1="98" y1="228" x2="130" y2="228" stroke="#00bfa5" stroke-width="5" stroke-linecap="round"/>
  <line x1="98" y1="250" x2="162" y2="250" stroke="#00bfa5" stroke-width="5" stroke-linecap="round"/>
  <line x1="98" y1="272" x2="130" y2="272" stroke="#00bfa5" stroke-width="5" stroke-linecap="round"/>
  <polyline points="148,218 168,250 148,282" fill="none" stroke="#00bfa5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Brand name -->
  <text x="206" y="268" font-family="Georgia, serif" font-size="68" font-weight="700" fill="#ffffff" letter-spacing="-1">Eksakta<tspan fill="#00bfa5">Lab</tspan></text>
  <!-- Tagline -->
  <text x="80" y="340" font-family="Arial, sans-serif" font-size="26" fill="#7fb3d3" letter-spacing="0.5">Laboratorium Belajar Matematika SMA</text>
  <!-- Divider -->
  <line x1="80" y1="380" x2="600" y2="380" stroke="#1e3a5f" stroke-width="1.5"/>
  <!-- Features row -->
  <text x="80" y="420" font-family="Arial, sans-serif" font-size="20" fill="#00bfa5">✦</text>
  <text x="104" y="420" font-family="Arial, sans-serif" font-size="20" fill="#94b8cc">16 Materi Lengkap</text>
  <text x="280" y="420" font-family="Arial, sans-serif" font-size="20" fill="#00bfa5">✦</text>
  <text x="304" y="420" font-family="Arial, sans-serif" font-size="20" fill="#94b8cc">Contoh Soal &amp; Pembahasan</text>
  <text x="560" y="420" font-family="Arial, sans-serif" font-size="20" fill="#00bfa5">✦</text>
  <text x="584" y="420" font-family="Arial, sans-serif" font-size="20" fill="#94b8cc">Latihan Interaktif</text>
  <!-- URL -->
  <text x="80" y="490" font-family="Arial, sans-serif" font-size="18" fill="#4a7a9b">lutfima11.github.io/eksaktalab</text>
  <!-- Decorative right side -->
  <circle cx="980" cy="315" r="200" fill="none" stroke="#1e3a5f" stroke-width="1.5" opacity="0.7"/>
  <circle cx="980" cy="315" r="140" fill="none" stroke="#1a3354" stroke-width="1" opacity="0.5"/>
  <!-- Math symbol decoration -->
  <text x="910" y="360" font-family="Georgia, serif" font-size="110" fill="#162032" opacity="0.9">∑</text>
  <text x="1020" y="260" font-family="Georgia, serif" font-size="60" fill="#1a3354" opacity="0.7">π</text>
  <text x="870" y="260" font-family="Georgia, serif" font-size="50" fill="#1a3354" opacity="0.6">∫</text>
  <text x="1050" y="400" font-family="Georgia, serif" font-size="45" fill="#1a3354" opacity="0.6">√</text>
</svg>
